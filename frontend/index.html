<!doctype html>
<html lang="ro">
  <head>
    <script>
      (function(){var t=localStorage.getItem('wave_theme');var d=window.matchMedia('(prefers-color-scheme: dark)').matches;document.documentElement.setAttribute('data-theme',t||(d?'dark':'light'));})();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/wave-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0096c7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WAVE" />
    <meta name="description" content="Context-aware event recommendations powered by weather and your preferences." />
    <title>WAVE — Event Recommender</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
